<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小猪的礼物</title>
    <style>
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .form-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }

        .form-container h2 {
            text-align: center;
            color: #333333;
            margin-bottom: 10px;
            margin-top: 0;
        }

        .form-container p.subtitle {
            text-align: center;
            color: #666666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333333;
            font-weight: 500;
            font-size: 15px;
        }

        .form-group input, 
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #cccccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        .form-group input:focus, 
        .form-group textarea:focus {
            border-color: #4CAF50;
            outline: none;
            box-shadow: 0 0 5px rgba(76, 175, 80, 0.2);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .submit-btn:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>恭喜你被🎁砸中辣</h2>
        <p class="subtitle">填错信息不退货哦。</p>
        
        <form action="#" method="POST" onsubmit="alert('信息提交成功！(填了也不会送~)'); return false;">
            
            <div class="form-group">
                <label for="name">收信人姓名</label>
                <input type="text" id="name" name="name" placeholder="请输入你的小名" required>
            </div>

            <div class="form-group">
                <label for="phone">联系电话</label>
                <input type="tel" id="phone" name="phone" placeholder="请输入你的手机号码" pattern="[0-9]{11}" title="请输入11位手机号码" required>
            </div>

            <div class="form-group">
                <label for="address">详细收货地址</label>
                <textarea id="address" name="address" placeholder="具体猪圈位置" required></textarea>
            </div>

            <button type="submit" class="submit-btn">确认提交</button>
            
        </form>
    </div>

</body>
</html>
