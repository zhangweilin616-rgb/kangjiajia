<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>爱·轰炸</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.96), rgba(241,246,255,0.94) 42%, rgba(232,239,255,0.97) 100%),
        linear-gradient(135deg, #eef4ff, #fff2fb);
    }

    #stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .bg-glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(85px);
      opacity: 0.30;
      pointer-events: none;
      animation: glowMove 10s ease-in-out infinite alternate;
    }

    .bg-glow.one {
      width: 420px;
      height: 420px;
      left: 8%;
      top: 6%;
      background: rgba(255, 163, 211, 0.48);
    }

    .bg-glow.two {
      width: 460px;
      height: 460px;
      right: 6%;
      bottom: 8%;
      background: rgba(144, 197, 255, 0.45);
      animation-duration: 12.5s;
    }

    @keyframes glowMove {
      from { transform: translateY(0px) scale(1); }
      to { transform: translateY(28px) scale(1.08); }
    }

    .win {
      position: absolute;
      width: 170px;
      height: 96px;
      border-radius: 12px;
      overflow: hidden;
      background: rgba(255,255,255,0.985);
      border: 1px solid rgba(255,255,255,0.85);
      box-shadow:
        0 10px 28px rgba(0,0,0,0.16),
        0 2px 8px rgba(0,0,0,0.08);
      backdrop-filter: blur(10px);
      user-select: none;
      pointer-events: none;
      opacity: 0;
      z-index: 10;
      transform: scale(0.74);
    }

    .win.show {
      animation: popIn 0.28s cubic-bezier(.2,.8,.2,1) forwards;
    }

    .win.vanish {
      animation: vanish 0.42s ease forwards !important;
    }

    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.74); }
      70% { opacity: 1; transform: scale(1.06); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes vanish {
      0% { opacity: 1; filter: blur(0px); }
      100% { opacity: 0; filter: blur(8px); transform: scale(0.62); }
    }

    .titlebar {
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px 0 10px;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.2px;
      border-bottom: 1px solid rgba(255,255,255,0.35);
    }

    .title-left {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .win-icon {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      background: rgba(255,255,255,0.95);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.08);
      flex: 0 0 auto;
    }

    .title-text {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 4px;
      flex: 0 0 auto;
    }

    .btn {
      width: 16px;
      height: 16px;
      border-radius: 4px;
      background: rgba(255,255,255,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      line-height: 1;
    }

    .content {
      height: calc(100% - 28px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 12px;
      text-align: center;
      font-size: 16px;
      color: #2d2d2d;
      line-height: 1.25;
      background: linear-gradient(180deg, rgba(255,255,255,0.985), rgba(247,250,255,0.985));
    }

    .hint {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 99999;
      background: rgba(255,255,255,0.80);
      border: 1px solid rgba(255,255,255,0.72);
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
      backdrop-filter: blur(8px);
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 13px;
      color: #666;
      letter-spacing: 0.2px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="stage">
    <div class="bg-glow one"></div>
    <div class="bg-glow two"></div>
  </div>
  <div class="hint">爱你，康佳怡</div>

  <script>
    const NEXT_URL = "giftaddress.html"; // 改成你的下一页地址
    const WINDOW_W = 170;
    const WINDOW_H = 96;

    const HEART_COUNT = 92;
    const HEART_DELAY = 34;
    const HEART_HOLD = 1400;

    const FULL_HOLD = 5000;
    const FINAL_VANISH_TIME = 1200;

    const texts = [
      "多喝水", "好好爱自己", "好好吃饭", "保持好心情",
      "压力别太大", "顺顺利利", "别熬夜", "天凉了多穿衣服",
      "康佳怡是猪", "心想事成", "万事如意", "健康常驻",
      "幸福由自己定义", "天天开心", "一切都会变好", "充实自己"
    ];

    const titles = [
      "系统提示", "Windows 提醒", "温柔通知", "重要消息", "爱心提醒","小麟提醒","闹钟提醒"
    ];

    const titleColors = [
      ["#5aa6ff", "#78b9ff"],
      ["#ff7eb6", "#ff9dcb"],
      ["#8f8cff", "#a9a8ff"],
      ["#4bc0c8", "#7de0d7"],
      ["#ff8a8a", "#ffb199"]
    ];

    const stage = document.getElementById("stage");
    const popups = [];
    const timers = [];

    let stopped = false;
    let redirecting = false;
    let animationStarted = false;
    let rafId = null;

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function choice(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function sleep(ms) {
      return new Promise(resolve => {
        const t = setTimeout(resolve, ms);
        timers.push(t);
      });
    }

    function goNextPage() {
      if (redirecting) return;
      redirecting = true;
      window.location.href = NEXT_URL;
    }

    // 核心修改1：爱心完美居中及自适应屏幕
    function heartPositionsCentered(n, w, h) {
      const p = [];
      const cx = w / 2;
      const cy = h / 2;
      
      // 根据屏幕大小动态计算爱心的比例缩放
      const scale = Math.min(w, h) / 45; 

      for (let i = 0; i < n; i++) {
        const th = i / n * 2 * Math.PI;
        const x = 16 * Math.pow(Math.sin(th), 3);
        const y = 13 * Math.cos(th) - 5 * Math.cos(2 * th) - 2 * Math.cos(3 * th) - Math.cos(4 * th);

        // 数学公式中 Y 轴的视觉中心略偏下，加上 2.5 进行补偿，使其在网页绝对居中
        const sx = Math.floor(cx + x * scale - WINDOW_W / 2);
        const sy = Math.floor(cy - (y + 2.5) * scale - WINDOW_H / 2);

        // 去掉 clamp，让爱心可以在各种屏幕尺寸下自由展现，不受边缘挤压
        p.push([sx, sy]);
      }

      return p;
    }

    // 核心修改2：扩大网格范围，真正无缝铺满全屏
    function fullScreenGridPositions(w, h) {
      const positions = [];
      const stepX = 140; 
      const stepY = 80;

      // 范围向外扩大，确保四周边缘没有缝隙
      const startX = -WINDOW_W;
      const startY = -WINDOW_H;
      const endX = w + WINDOW_W;
      const endY = h + WINDOW_H;

      for (let y = startY; y <= endY; y += stepY) {
        for (let x = startX; x <= endX; x += stepX) {
          positions.push([x + rand(-15, 15), y + rand(-10, 10)]);
        }
      }

      const cx = w / 2 - WINDOW_W / 2;
      const cy = h / 2 - WINDOW_H / 2;

      // 依然保持从中心向四周扩散出现的顺序
      positions.sort((a, b) => {
        const da = Math.hypot(a[0] - cx, a[1] - cy);
        const db = Math.hypot(b[0] - cx, b[1] - cy);
        return da - db;
      });

      return positions;
    }

    function makeWindow(x, y, text) {
      const win = document.createElement("div");
      win.className = "win";
      const pair = choice(titleColors);

      win.innerHTML = `
        <div class="titlebar" style="background: linear-gradient(90deg, ${pair[0]}, ${pair[1]});">
          <div class="title-left">
            <div class="win-icon"></div>
            <div class="title-text">${choice(titles)}</div>
          </div>
          <div class="controls">
            <div class="btn">—</div>
            <div class="btn">□</div>
            <div class="btn">×</div>
          </div>
        </div>
        <div class="content">${text || choice(texts)}</div>
      `;

      stage.appendChild(win);
      win.classList.add("show");

      const obj = {
        el: win,
        baseX: x,
        baseY: y,
        bornAt: performance.now(),
        floatAmpX: rand(3, 10),
        floatAmpY: rand(6, 16),
        jitterAmp: rand(0.7, 2.2),
        rotateAmp: rand(1.1, 4.2),
        speedA: rand(0.0017, 0.0035),
        speedB: rand(0.0020, 0.0045),
        speedC: rand(0.0030, 0.0065),
        phaseA: rand(0, Math.PI * 2),
        phaseB: rand(0, Math.PI * 2),
        phaseC: rand(0, Math.PI * 2),
        dead: false
      };

      popups.push(obj);
      return obj;
    }

    function setTransform(obj, now) {
      if (!obj || obj.dead || !obj.el || !obj.el.isConnected) return;
      const t = now - obj.bornAt;
      let dx = 0, dy = 0, rot = 0;

      if (animationStarted) {
        dx = Math.sin(t * obj.speedA + obj.phaseA) * obj.floatAmpX +
             Math.sin(t * obj.speedC + obj.phaseC) * obj.jitterAmp;

        dy = Math.cos(t * obj.speedB + obj.phaseB) * obj.floatAmpY +
             Math.cos(t * obj.speedC * 1.2 + obj.phaseA) * obj.jitterAmp;

        rot = Math.sin(t * obj.speedA * 0.8 + obj.phaseB) * obj.rotateAmp;
      }

      obj.el.style.left = `${obj.baseX + dx}px`;
      obj.el.style.top = `${obj.baseY + dy}px`;
      obj.el.style.transform = `rotate(${rot}deg)`;
    }

    function animate(now) {
      for (const p of popups) {
        setTransform(p, now);
      }
      rafId = requestAnimationFrame(animate);
    }

    function destroyWindow(obj) {
      if (!obj || obj.dead || !obj.el) return;
      obj.dead = true;
      obj.el.classList.add("vanish");
      const t = setTimeout(() => {
        if (obj.el && obj.el.parentNode) {
          obj.el.parentNode.removeChild(obj.el);
        }
      }, 420);
      timers.push(t);
    }

    async function vanishAllAndRedirect() {
      if (stopped) return;
      stopped = true;

      for (const t of timers) clearTimeout(t);
      timers.length = 0;

      const alive = popups.filter(p => !p.dead && p.el && p.el.isConnected);
      if (alive.length === 0) {
        goNextPage();
        return;
      }

      const interval = FINAL_VANISH_TIME / alive.length;

      for (const p of alive) {
        destroyWindow(p);
        await sleep(interval);
      }

      await sleep(500);
      goNextPage();
    }

    async function run() {
      const sw = window.innerWidth;
      const sh = window.innerHeight;

      const heart = heartPositionsCentered(HEART_COUNT, sw, sh);

      for (let i = 0; i < heart.length; i++) {
        if (stopped) return;
        const [x, y] = heart[i];
        const text = i === heart.length - 1 ? "充实自己" : choice(texts);
        makeWindow(x, y, text);
        await sleep(HEART_DELAY);
      }

      if (stopped) return;
      animationStarted = true;
      await sleep(HEART_HOLD);

      const existingKey = new Set(
        popups.map(p => `${Math.round(p.baseX)}_${Math.round(p.baseY)}`)
      );

      const fullPositions = fullScreenGridPositions(sw, sh);

      for (const [x, y] of fullPositions) {
        if (stopped) return;
        const key = `${Math.round(x)}_${Math.round(y)}`;
        if (existingKey.has(key)) continue;

        makeWindow(x, y, choice(texts));
        await sleep(10);
      }

      if (stopped) return;
      await sleep(FULL_HOLD);
      await vanishAllAndRedirect();
    }

    // 事件绑定：空格结束动画
    document.addEventListener("keydown", (e) => {
      if (e.code === "Space") {
        e.preventDefault();
        vanishAllAndRedirect();
      }
    });

    // 核心修改3：点击页面任意位置请求进入网页全屏（可选交互）
    document.addEventListener("click", () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(err => {
          console.log(`全屏请求被拦截，可能因为浏览器限制: ${err.message}`);
        });
      }
    });

    rafId = requestAnimationFrame(animate);
    run();
  </script>
</body>
</html>
